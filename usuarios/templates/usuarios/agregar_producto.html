{% extends 'home.html' %}

{% block content %}
<h1>Agregar producto a {{ cliente.nombre }}</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Agregar producto</button>
</form>

<a href="{% url 'detalle_cliente' cliente.id %}">Volver al detalle</a>
{% endblock %}
